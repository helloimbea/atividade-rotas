<section class="title">
<h1>Users</h1>
</section>

<section class="search-box">
<input type="search" class="search" placeholder="Search names" [(ngModel)]="searchTerm">
</section>

<section class="container">
@if(isLoading){

  <section class="loading-section">
  <div  class="loading">
  <p>Loading...</p>
  </div>
  </section>

}@else {
  @if(!hasResults()){
  <section class="no-results-section">
  <div  class="no-results">
  <p>Can't find results</p>
  </div>
  </section>
  }@else {
  @for (user of filteredUsers; track user.id){

  <section class="users">
    <div>
      <img src="/assets/user.png" class="user-img">
    </div>
    <div class="user-div">
    <ul class="list">
  <li class="name">
    <span>{{ user.name }}</span>
  </li>
  <li class="email">
     <span>Email:</span> {{ user.email }}
  </li>
  <li class="city">
    <span>City:</span> {{user.address.city}}
  </li>
   </ul>
   <section class="button-details">
   <button class="details" [routerLink]="['/details', user.id]"><span class="material-symbols-outlined">
    data_check
    </span>Details
</button>

   </section>
   </div>
  </section>
  }
  }
}

</section>
