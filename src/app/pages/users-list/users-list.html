<h1>Users</h1>
<hr>
@if(isLoading){
<p>Loading...</p>
}@else {
  @for (user of users; track user.id){
  <section class="users">
    <ul class="list">
  <li class="name">
    Name: {{ user.name }}
  </li>
  <li class="email">
     Email: {{ user.email }}
  </li>
  <li class="city">
    City: {{user.address.city}}
  </li>
   </ul>
   <button class="details" [routerLink]="['/details', user.id]">Details</button>
  </section>
  }

}
